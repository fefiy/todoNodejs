name: CICD

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v3

      - name: Login to docker hub
        run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}

      - name: Build docker image
        run: docker build -t fefiy/todoNodejs .

      - name: Publish image to docker hub
        run: docker push fefiy/todoNodejs:latest

  deploy:
    needs: build
    runs-on: todoawsrunner
    steps:
      - name: Pull image from docker hub
        run: docker pull fefiy/todoNodejs:latest

      - name: Delete old container
        run: docker rm -f nodejs-app-container || true

      - name: Run docker container
        run: docker run -d -p 5000:5000 --name nodejs-app-container fefiy/todoNodejs
